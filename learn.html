<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eternal Word — Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--gold:#9A7828;--gold-l:#B8922A;--gold-d:#6A5020;--bg:#FAFAF8;--panel:#FFFFFF;--panel2:#F5F3EF;--sb:#F0EDE6;--border:#E2D8C8;--text:#3A3530;--text-d:#7A6A55;--text-b:#1A1510}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:0 32px 100px}

nav{display:flex;align-items:center;justify-content:space-between;padding:32px 0 20px;border-bottom:1px solid var(--border);animation:rise 0.6s ease both}
.nav-logo{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text-b);letter-spacing:2px;text-decoration:none}
.nav-links{display:flex;gap:32px}
.nav-links a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);text-decoration:none;transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* Breadcrumb */
.breadcrumb{padding:20px 0;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-d)}
.breadcrumb a{color:var(--text-d);text-decoration:none;transition:color 0.2s}
.breadcrumb a:hover{color:var(--gold)}
.breadcrumb span{margin:0 8px;opacity:0.4}

/* Two column layout: topic list + content */
.study-shell{display:grid;grid-template-columns:220px 1fr;gap:32px;align-items:start}

/* Topic sidebar */
.topic-list{background:var(--panel);border:1px solid var(--border);position:sticky;top:24px}
.tl-head{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.tl-back{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);text-decoration:none;display:block;margin-bottom:14px;transition:color 0.2s}
.tl-back:hover{color:var(--gold)}
.tl-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text-b);line-height:1.3}
.tl-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-top:5px}
.tl-items{padding:6px 0}
.tl-ov{display:block;padding:10px 20px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);border-left:2px solid transparent;text-decoration:none;transition:all 0.2s;cursor:pointer}
.tl-ov:hover{color:var(--text-b);border-left-color:var(--gold-d);background:rgba(154,120,40,0.03)}
.tl-ov.on{color:var(--text-b);border-left-color:var(--gold);background:rgba(154,120,40,0.05)}
.tl-lesson{display:flex;align-items:flex-start;gap:10px;padding:10px 20px;border-left:2px solid transparent;transition:all 0.2s;cursor:pointer;text-decoration:none}
.tl-lesson:hover{background:rgba(154,120,40,0.03);border-left-color:var(--gold-d)}
.tl-lesson.on{background:rgba(154,120,40,0.06);border-left-color:var(--gold)}
.tl-n{font-family:'Cinzel',serif;font-size:9px;color:var(--text-d);min-width:16px;margin-top:2px}
.tl-lesson.on .tl-n{color:var(--gold-d)}
.tl-lt{font-size:13px;line-height:1.5;color:var(--text-d);transition:color 0.2s}
.tl-lesson:hover .tl-lt,.tl-lesson.on .tl-lt{color:var(--text-b)}

/* Content panels */
#overview{display:none}
#lesson-view{display:none}

.ov-hero{padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:28px}
.ov-title{font-family:'Cinzel',serif;font-size:clamp(20px,2.5vw,26px);font-weight:600;color:var(--text-b);margin-bottom:8px}
.ov-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.ov-desc{font-size:17px;line-height:1.85;color:var(--text-d);font-style:italic}
.ov-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.ov-item{display:flex;align-items:center;gap:14px;background:var(--panel);padding:18px 22px;cursor:pointer;border-left:2px solid transparent;transition:all 0.25s}
.ov-item:hover{background:var(--panel2);border-left-color:var(--gold)}
.ov-num{font-family:'Cinzel',serif;font-size:9px;color:var(--text-d);min-width:18px}
.ov-ts{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text-b)}
.ov-arr{margin-left:auto;color:var(--text-d);transition:all 0.25s}
.ov-item:hover .ov-arr{color:var(--gold);transform:translateX(4px)}

/* Lesson */
.lv-head{padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:28px}
.lv-num{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--text-d);margin-bottom:10px}
.lv-title{font-family:'Cinzel',serif;font-size:clamp(18px,2.5vw,24px);font-weight:600;color:var(--text-b)}

.key-idea{background:var(--panel2);border:1px solid var(--border);border-left:2px solid var(--gold);padding:18px 22px;margin-bottom:22px}
.ki-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.ki-t{font-family:'Cinzel',serif;font-size:15px;font-weight:500;color:var(--text-b);line-height:1.65}

.sc-block{margin-bottom:28px}
.sc-ref{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:12px}
.sc-t{font-size:clamp(20px,2.5vw,26px);font-weight:300;font-style:italic;color:var(--text-b);line-height:1.7}

.orn{display:flex;align-items:center;gap:12px;margin:22px 0;opacity:0.2}
.orn-line{flex:1;height:1px;background:var(--gold)}
.orn-dot{color:var(--gold);font-size:10px;letter-spacing:6px}

.block-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.med-para p{font-size:clamp(17px,1.8vw,19px);line-height:2;color:var(--text);margin-bottom:18px}
.med-para p:last-child{margin-bottom:0}

.qbar{border-left:2px solid var(--gold);padding:18px 24px;background:rgba(154,120,40,0.03);margin:22px 0}
.qbar-t{font-size:18px;font-style:italic;color:var(--text-b);line-height:1.7}
.qbar-by{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-top:10px}

.src-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.src-tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--border);color:var(--text-d)}

.call-block{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--text-b);padding:24px 28px;margin-bottom:18px;text-align:center}
.call-text{font-family:'Cinzel',serif;font-size:clamp(13px,1.5vw,15px);font-weight:500;color:var(--text-b);line-height:1.9}
.pray-block{background:var(--panel2);border:1px solid var(--border);padding:28px;margin-bottom:18px;text-align:center}
.pray-text{font-size:clamp(16px,1.7vw,19px);font-style:italic;font-weight:300;color:var(--text);line-height:2}

/* Side reflection */
.two-col-lesson{display:grid;grid-template-columns:1fr 260px;gap:22px}
.sp{background:var(--panel);border:1px solid var(--border);padding:22px;margin-bottom:14px}
.sp-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.sp-q{padding:14px 0;border-bottom:1px solid var(--border)}
.sp-q:first-child{padding-top:0}
.sp-q:last-child{border-bottom:none;padding-bottom:0}
.sp-qt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.sp-qtxt{font-size:clamp(14px,1.4vw,16px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.65}

.lv-nav{display:flex;justify-content:space-between;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.lv-btn{background:none;border:1px solid var(--border);color:var(--text-d);font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;cursor:pointer;transition:all 0.2s}
.lv-btn:hover{border-color:var(--text-b);color:var(--text-b)}
.lv-btn:disabled{opacity:0.2;cursor:default}

#loading{text-align:center;padding:80px 0}
.load-t{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--text-d)}
.fade-in{animation:rise 0.3s ease both}
footer{text-align:center;padding:60px 0 20px;opacity:0.3}
footer p{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.study-shell{grid-template-columns:1fr}.topic-list{display:none}.two-col-lesson{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <nav>
    <a class="nav-logo" href="index.html">The Eternal Word</a>
    <div class="nav-links">
      <a href="index.html">Daily</a>
      <a href="topics.html">Topics</a>
      <a href="learn.html?topic=christian-identity">Identity</a>
      <a href="learn.html?topic=the-cross">The Cross</a>
      <a href="learn.html?topic=discipleship">Discipleship</a>
      <a href="learn.html?topic=apologetics">Apologetics</a>
      <a href="learn.html?topic=prayer">Prayer</a>
      <a href="learn.html?topic=suffering">Suffering</a>
      <a href="learn.html?topic=holy-spirit">Holy Spirit</a>
      <a href="learn.html?topic=sin-and-grace">Sin & Grace</a>
      <a href="learn.html?topic=the-church">The Church</a>
      <a href="learn.html?topic=eternity">Eternity</a>
      <a href="learn.html?topic=the-sabbath">The Sabbath</a>
      <a href="learn.html?topic=holiness-of-god">Holiness</a>
    </div>
  </nav>

  <div class="breadcrumb" id="breadcrumb">
    <a href="topics.html">Topics</a><span>→</span><span id="bc-topic">Loading…</span>
  </div>

  <div id="loading"><p class="load-t">Preparing your study</p></div>

  <div class="study-shell" id="study-shell" style="display:none">
    <!-- Topic list sidebar -->
    <aside class="topic-list">
      <div class="tl-head">
        <a class="tl-back" href="topics.html">← All Topics</a>
        <div class="tl-title" id="tl-title">Loading…</div>
        <div class="tl-sub" id="tl-sub"></div>
      </div>
      <div class="tl-items" id="tl-items"></div>
    </aside>

    <!-- Main content -->
    <main>
      <div id="overview"></div>
      <div id="lesson-view"></div>
    </main>
  </div>

  <footer><p>The fear of the LORD is the beginning of wisdom — Proverbs 9:10</p></footer>
</div>

<script>
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const params=new URLSearchParams(location.search);
const slug=params.get('topic');
const initLesson=parseInt(params.get('lesson')||'0');
let topic=null,lessons=[],cur=0;
if(!slug)location.href='topics.html';

async function init(){
  const [tr,lr]=await Promise.all([
    fetch(`${SB}/rest/v1/topics?slug=eq.${slug}&select=*&limit=1`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}}).then(r=>r.json()),
    fetch(`${SB}/rest/v1/lessons?topic_slug=eq.${slug}&select=*&order=lesson_number.asc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}}).then(r=>r.json())
  ]);
  if(!tr?.length){location.href='topics.html';return}
  topic=tr[0];lessons=lr;
  document.title=`${topic.title} — The Eternal Word`;
  document.getElementById('bc-topic').textContent=topic.title;
  document.getElementById('tl-title').textContent=topic.title;
  document.getElementById('tl-sub').textContent=topic.subtitle;
  // highlight active nav link
  document.querySelectorAll('.nav-links a').forEach(a=>{if(a.href.includes(slug))a.classList.add('active')});
  buildSidebar();
  document.getElementById('loading').style.display='none';
  document.getElementById('study-shell').style.display='grid';
  if(initLesson&&lessons.find(l=>l.lesson_number===initLesson))showLesson(initLesson);
  else showOverview();
}

function buildSidebar(){
  document.getElementById('tl-items').innerHTML=
    `<div class="tl-ov on" id="sb-ov" onclick="showOverview()">Overview</div>`+
    lessons.map(l=>`<div class="tl-lesson" id="sb-${l.lesson_number}" onclick="showLesson(${l.lesson_number})"><span class="tl-n">${l.lesson_number}</span><span class="tl-lt">${l.title}</span></div>`).join('');
}

function setActive(id){
  document.querySelectorAll('.tl-ov,.tl-lesson').forEach(el=>el.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
}

function showOverview(){
  cur=0;
  document.getElementById('lesson-view').style.display='none';
  setActive('sb-ov');
  const ov=document.getElementById('overview');
  ov.style.display='block';
  ov.innerHTML=`
    <div class="ov-hero">
      <div class="ov-title">${topic.title}</div>
      <div class="ov-sub">${topic.subtitle}</div>
      <div class="ov-desc">${topic.description}</div>
    </div>
    <div class="ov-list">${lessons.map(l=>`
      <div class="ov-item" onclick="showLesson(${l.lesson_number})">
        <span class="ov-num">${l.lesson_number}</span>
        <span class="ov-ts">${l.title}</span>
        <span class="ov-arr">→</span>
      </div>`).join('')}</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function showLesson(num){
  const l=lessons.find(x=>x.lesson_number===num);
  if(!l)return;
  cur=num;
  history.replaceState(null,'',`?topic=${slug}&lesson=${num}`);
  document.getElementById('overview').style.display='none';
  setActive(`sb-${num}`);
  const paras=l.meditation.split(/\n\n|\n/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
  const srcs=(l.sources||[]).map(s=>`<span class="src-tag">${s}</span>`).join('');
  const qs=(l.reflection_questions||[]).map(q=>`<div class="sp-q"><div class="sp-qt">${q.topic}</div><div class="sp-qtxt">${q.question}</div></div>`).join('');
  const lv=document.getElementById('lesson-view');
  lv.style.display='block';
  lv.classList.add('fade-in');
  setTimeout(()=>lv.classList.remove('fade-in'),350);
  lv.innerHTML=`
    <div class="lv-head">
      <div class="lv-num">Lesson ${num} of ${lessons.length}</div>
      <div class="lv-title">${l.title}</div>
    </div>
    <div class="two-col-lesson">
      <div>
        ${l.key_idea?`<div class="key-idea"><div class="ki-lbl">Key Idea</div><div class="ki-t">${l.key_idea}</div></div>`:''}
        <div class="sc-block">
          <div class="sc-ref">${l.scripture_reference}</div>
          <div class="sc-t">"${l.scripture_text}"</div>
        </div>
        <div class="orn"><div class="orn-line"></div><span class="orn-dot">· · ·</span><div class="orn-line"></div></div>
        <div class="block-lbl">Meditation</div>
        <div class="med-para">${paras}</div>
        <div class="qbar"><div class="qbar-t">"${l.quote_text}"</div><div class="qbar-by">— ${l.quote_author}</div></div>
        <div class="src-row">${srcs}</div>
        <div class="orn"><div class="orn-line"></div><span class="orn-dot">· · ·</span><div class="orn-line"></div></div>
        ${l.call_to_action?`<div class="call-block"><div class="block-lbl">Today's Call</div><div class="call-text">${l.call_to_action}</div></div>`:''}
        ${l.prayer?`<div class="pray-block"><div class="block-lbl">Closing Prayer</div><div class="pray-text">${l.prayer}</div></div>`:''}
        <div class="lv-nav">
          <button class="lv-btn" onclick="navigate(-1)" ${num<=1?'disabled':''}>← Previous</button>
          <button class="lv-btn" onclick="navigate(1)" ${num>=lessons.length?'disabled':''}>Next →</button>
        </div>
      </div>
      <div>
        <div class="sp"><div class="sp-lbl">Reflection</div>${qs}</div>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function navigate(dir){showLesson(cur+dir)}
init().catch(console.error);
</script>
</body>
</html>
