<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eternal Word — Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{--navy:#0E1628;--navy2:#131D35;--navy4:#0A1020;--gold:#C9A43A;--gold-l:#E0BC5A;--gold-d:#8A6E20;--border:rgba(201,164,58,0.15);--border2:rgba(201,164,58,0.08);--text:#C8B898;--text-d:#6A6050;--text-b:#EDE0C0;--sb-w:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;display:flex;min-height:100vh}
.sb{width:var(--sb-w);min-width:var(--sb-w);background:var(--navy);border-right:1px solid var(--border2);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:300;transition:transform 0.3s ease}
.sb-logo{padding:28px 24px 22px;border-bottom:1px solid var(--border2)}
.sb-logo a{text-decoration:none}
.sb-logo-text{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold)}
.sb-logo-sub{font-size:11px;color:var(--text-d);margin-top:3px;font-style:italic}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-link{display:block;padding:10px 24px;text-decoration:none;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-b);border-left:2px solid transparent;transition:all 0.2s}
.sb-link:hover{color:var(--gold);border-left-color:var(--gold-d);background:rgba(201,164,58,0.04)}
.sb-link.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.07)}
.sb-study-row{display:flex;align-items:center}
.sb-chevron{background:none;border:none;padding:10px 8px 10px 24px;cursor:pointer;display:flex;align-items:center;flex-shrink:0;transition:opacity 0.2s}
.sb-chevron:hover{opacity:0.8}
.sb-study-link{padding-left:4px;flex:1}
.sb-foot{padding:20px 24px;border-top:1px solid var(--border2)}
.sb-foot-date{font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.5px;color:var(--text-b);line-height:2.1;font-weight:500}
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(2px)}
.mob-bar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);border-bottom:1px solid var(--border2);z-index:150;align-items:center;justify-content:space-between;padding:0 20px}
.mob-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--gold);text-decoration:none}
.mob-ham{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px}
.mob-ham span{display:block;width:22px;height:1.5px;background:var(--gold-d)}
.main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column}
@media(max-width:860px){
  .sb{transform:translateX(-100%)}
  .mob-bar{display:flex}
  .main{margin-left:0;padding-top:52px}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy4);color:var(--text);font-family:'Cormorant Garamond',serif;display:flex;min-height:100vh}

/* Nav sidebar */
.nav-sb{width:var(--sb-w);min-width:var(--sb-w);background:var(--navy);border-right:1px solid var(--border2);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:200}
.nsb-logo{padding:28px 24px 22px;border-bottom:1px solid var(--border2)}
.nsb-logo a{text-decoration:none}
.nsb-logo-text{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold)}
.nsb-logo-sub{font-size:11px;color:var(--text-d);margin-top:3px;font-style:italic}
.nsb-nav{flex:1;overflow-y:auto;padding:16px 0}
.nsb-section{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--text-d);padding:18px 24px 8px;opacity:0.5}
.nsb-link{
  display:block;padding:10px 24px;text-decoration:none;
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-b);border-left:2px solid transparent;
  transition:all 0.2s;
}
.nsb-link:hover{color:var(--gold);border-left-color:var(--gold-d);background:rgba(201,164,58,0.04)}
.nsb-link.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.07)}

.nsb-study-toggle{cursor:pointer;display:flex;align-items:center}
.nsb-study-toggle:hover{color:var(--gold)}

/* Shell */
.shell{margin-left:var(--sb-w);flex:1;display:flex}

/* Topic sidebar */
.topic-sb{width:var(--tsb-w);min-width:var(--tsb-w);background:var(--navy2);border-right:1px solid var(--border2);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.tsb-head{padding:28px 20px 20px;border-bottom:1px solid var(--border2)}
.tsb-back{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);text-decoration:none;display:block;margin-bottom:16px;transition:color 0.2s}
.tsb-back:hover{color:var(--gold)}
.tsb-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text-b);line-height:1.3}
.tsb-sub{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-top:5px}
.tsb-list{padding:6px 0}
.tsb-ov{display:block;padding:10px 20px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);border-left:2px solid transparent;cursor:pointer;transition:all 0.2s}
.tsb-ov:hover,.tsb-ov.on{color:var(--gold);border-left-color:var(--gold);background:rgba(201,164,58,0.05)}
.tsb-lesson{display:flex;gap:12px;padding:10px 20px;border-left:2px solid transparent;cursor:pointer;transition:all 0.2s;text-decoration:none}
.tsb-lesson:hover{background:rgba(201,164,58,0.03);border-left-color:var(--gold-d)}
.tsb-lesson.on{background:rgba(201,164,58,0.06);border-left-color:var(--gold)}
.tsb-n{font-family:'Cinzel',serif;font-size:9px;color:var(--text-d);min-width:16px;margin-top:2px}
.tsb-lesson.on .tsb-n{color:var(--gold-d)}
.tsb-lt{font-size:13px;line-height:1.5;color:var(--text-d);transition:color 0.2s}
.tsb-lesson:hover .tsb-lt,.tsb-lesson.on .tsb-lt{color:var(--text-b)}

/* Content */
.content{flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid var(--border2);background:rgba(14,22,40,0.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.tb-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--text-b);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.tb-prog{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d)}

/* Overview */
#overview{padding:44px 40px 80px;display:none}
.ov-hero{padding-bottom:32px;border-bottom:1px solid var(--border2);margin-bottom:28px}
.ov-title{font-family:'Cinzel',serif;font-size:clamp(20px,2.5vw,26px);font-weight:600;color:var(--text-b);margin-bottom:8px}
.ov-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.ov-desc{font-size:17px;font-style:italic;color:var(--text-d);line-height:1.85}
.ov-list{display:flex;flex-direction:column;gap:1px;background:var(--border2)}
.ov-item{display:flex;align-items:center;gap:16px;background:var(--navy);padding:18px 22px;cursor:pointer;border-left:2px solid transparent;transition:all 0.25s}
.ov-item:hover{background:var(--navy2);border-left-color:var(--gold)}
.ov-num{font-family:'Cinzel',serif;font-size:9px;color:var(--text-d);min-width:18px}
.ov-ts{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text-b)}
.ov-arr{margin-left:auto;color:var(--text-d);transition:all 0.25s}
.ov-item:hover .ov-arr{color:var(--gold);transform:translateX(4px)}

/* Lesson */
#lesson-view{display:none;padding:40px 40px 80px;flex:1;flex-direction:column}
.lv-head{padding-bottom:28px;border-bottom:1px solid var(--border2);margin-bottom:28px}
.lv-num{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--text-d);margin-bottom:12px}
.lv-title{font-family:'Cinzel',serif;font-size:clamp(18px,2.5vw,24px);font-weight:600;color:var(--text-b)}
.two-col{display:grid;grid-template-columns:1fr 260px;gap:24px}

.key-idea{background:var(--navy2);border:1px solid var(--border2);border-left:2px solid var(--gold-d);padding:18px 22px;margin-bottom:22px}
.ki-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.ki-t{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--text-b);line-height:1.65}

.sc-block{margin-bottom:28px}
.sc-ref{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:12px}
.sc-t{font-size:clamp(20px,2.5vw,26px);font-weight:300;font-style:italic;color:var(--text-b);line-height:1.7}

.orn{display:flex;align-items:center;gap:14px;margin:22px 0;opacity:0.2}
.orn-l{flex:1;height:1px;background:var(--gold)}
.orn-s{color:var(--gold);font-size:8px;letter-spacing:6px}

.block-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.med-body p{font-size:clamp(17px,1.8vw,19px);line-height:2.05;color:var(--text);margin-bottom:18px}
.med-body p:last-child{margin-bottom:0}

.qbar{border-left:2px solid var(--gold-d);padding:18px 24px;background:rgba(201,164,58,0.04);margin:22px 0}
.qbar-t{font-size:17px;font-style:italic;color:var(--text-b);line-height:1.7}
.qbar-by{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-top:10px}

.src-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.src-tag{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--border);color:var(--text-d)}

.call-block{background:var(--navy2);border:1px solid var(--border2);border-top:1px solid var(--gold-d);padding:24px 28px;margin-bottom:18px;text-align:center}
.call-text{font-family:'Cinzel',serif;font-size:clamp(13px,1.5vw,15px);font-weight:500;color:var(--text-b);line-height:1.9}
.pray-block{background:var(--navy);border:1px solid var(--border2);padding:28px;margin-bottom:18px;text-align:center}
.pray-text{font-size:clamp(16px,1.7vw,19px);font-style:italic;font-weight:300;color:var(--text);line-height:2}

.sp{background:var(--navy);border:1px solid var(--border2);padding:22px;margin-bottom:14px}
.sp-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:16px}
.sp-q{padding:14px 0;border-bottom:1px solid var(--border2)}
.sp-q:first-child{padding-top:0}
.sp-q:last-child{border-bottom:none;padding-bottom:0}
.sp-qt{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.sp-qtxt{font-size:clamp(14px,1.4vw,16px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.65}

/* Progress bar */
.progress-bar{height:2px;background:var(--border2);margin-bottom:28px}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold-d),var(--gold));transition:width 0.3s}

.lv-nav{display:flex;justify-content:space-between;margin-top:20px;padding-top:20px;border-top:1px solid var(--border2)}
.lv-btn{background:none;border:1px solid var(--border);color:var(--text-d);font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;cursor:pointer;transition:all 0.2s}
.lv-btn:hover{border-color:var(--gold);color:var(--gold)}
.lv-btn:disabled{opacity:0.2;cursor:default}

#loading{flex:1;display:flex;align-items:center;justify-content:center}
.load-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--text-d)}
.fade-in{animation:rise 0.3s ease both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:1100px){.nav-sb{display:none}.shell{margin-left:0}.two-col{grid-template-columns:1fr}}
@media(max-width:860px){.topic-sb{display:none}#lesson-view,#overview{padding:24px 24px 60px}.topbar{padding:16px 24px}}

</style>
</head>

<script>
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const params=new URLSearchParams(location.search);
const slug=params.get('topic');const initLesson=parseInt(params.get('lesson')||'0');
let topic=null,lessons=[],cur=0;
if(!slug)location.href='topics.html';

async function init(){
  const[tr,lr]=await Promise.all([
    fetch(`${SB}/rest/v1/topics?slug=eq.${slug}&select=*&limit=1`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}}).then(r=>r.json()),
    fetch(`${SB}/rest/v1/lessons?topic_slug=eq.${slug}&select=*&order=lesson_number.asc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}}).then(r=>r.json())
  ]);
  if(!tr?.length){location.href='topics.html';return}
  topic=tr[0];lessons=lr;
  document.title=`${topic.title} — The Eternal Word`;
  document.getElementById('tsb-title').textContent=topic.title;
  document.getElementById('tsb-sub').textContent=topic.subtitle;
  document.getElementById('tb-title').textContent=topic.title;
  document.querySelectorAll('.nsb-link').forEach(a=>{if(a.href.includes(slug))a.classList.add('on')});
  buildSidebar();
  document.getElementById('loading').style.display='none';
  if(initLesson&&lessons.find(l=>l.lesson_number===initLesson))showLesson(initLesson);
  else showOverview();
}

function buildSidebar(){
  document.getElementById('tsb-list').innerHTML=
    `<div class="tsb-ov on" id="sb-ov" onclick="showOverview()">Overview</div>`+
    lessons.map(l=>`<div class="tsb-lesson" id="sb-${l.lesson_number}" onclick="showLesson(${l.lesson_number})"><span class="tsb-n">${l.lesson_number}</span><span class="tsb-lt">${l.title}</span></div>`).join('');
}

function setActive(id){
  document.querySelectorAll('.tsb-ov,.tsb-lesson').forEach(el=>el.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
}

function showOverview(){
  cur=0;document.getElementById('lesson-view').style.display='none';
  document.getElementById('tb-prog').textContent=`${lessons.length} Lessons`;
  setActive('sb-ov');
  const ov=document.getElementById('overview');
  ov.style.display='block';
  ov.innerHTML=`
    <div class="ov-hero">
      <div class="ov-title">${topic.title}</div>
      <div class="ov-sub">${topic.subtitle}</div>
      <div class="ov-desc">${topic.description}</div>
    </div>
    <div class="ov-list">${lessons.map(l=>`
      <div class="ov-item" onclick="showLesson(${l.lesson_number})">
        <span class="ov-num">${l.lesson_number}</span>
        <span class="ov-ts">${l.title}</span>
        <span class="ov-arr">→</span>
      </div>`).join('')}</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function showLesson(num){
  const l=lessons.find(x=>x.lesson_number===num);if(!l)return;
  cur=num;history.replaceState(null,'',`?topic=${slug}&lesson=${num}`);
  document.getElementById('overview').style.display='none';setActive(`sb-${num}`);
  document.getElementById('tb-title').textContent=l.title;
  document.getElementById('tb-prog').textContent=`Lesson ${num} of ${lessons.length}`;
  const pct=Math.round((num/lessons.length)*100);
  const paras=l.meditation.split(/\n\n|\n/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
  const srcs=(l.sources||[]).map(s=>`<span class="src-tag">${s}</span>`).join('');
  const qs=(l.reflection_questions||[]).map(q=>`<div class="sp-q"><div class="sp-qt">${q.topic}</div><div class="sp-qtxt">${q.question}</div></div>`).join('');
  const lv=document.getElementById('lesson-view');
  lv.style.display='flex';lv.classList.add('fade-in');setTimeout(()=>lv.classList.remove('fade-in'),350);
  lv.innerHTML=`
    <div class="lv-head">
      <div class="lv-num">Lesson ${num} of ${lessons.length}</div>
      <div class="lv-title">${l.title}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="two-col">
      <div>
        ${l.key_idea?`<div class="key-idea"><div class="ki-lbl">Key Idea</div><div class="ki-t">${l.key_idea}</div></div>`:''}
        <div class="sc-block"><div class="sc-ref">${l.scripture_reference}</div><div class="sc-t">"${l.scripture_text}"</div></div>
        <div class="orn"><div class="orn-l"></div><span class="orn-s">· · ·</span><div class="orn-l"></div></div>
        <div class="block-lbl">Meditation</div>
        <div class="med-body">${paras}</div>
        <div class="qbar"><div class="qbar-t">"${l.quote_text}"</div><div class="qbar-by">— ${l.quote_author}</div></div>
        <div class="src-row">${srcs}</div>
        <div class="orn"><div class="orn-l"></div><span class="orn-s">· · ·</span><div class="orn-l"></div></div>
        ${l.call_to_action?`<div class="call-block"><div class="block-lbl">Today's Call</div><div class="call-text">${l.call_to_action}</div></div>`:''}
        ${l.prayer?`<div class="pray-block"><div class="block-lbl">Closing Prayer</div><div class="pray-text">${l.prayer}</div></div>`:''}
        <div class="lv-nav">
          <button class="lv-btn" onclick="navigate(-1)" ${num<=1?'disabled':''}>← Previous</button>
          <button class="lv-btn" onclick="navigate(1)" ${num>=lessons.length?'disabled':''}>Next →</button>
        </div>
      </div>
      <div><div class="sp"><div class="sp-lbl">Reflection</div>${qs}</div></div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function navigate(dir){showLesson(cur+dir)}
init().catch(console.error);

// Study Topics collapse/expand
function toggleStudy(e){
  if(e) e.stopPropagation();
  var links=document.getElementById('study-links');
  var arrow=document.getElementById('study-arrow');
  if(!links) return;
  var open=links.getAttribute('data-open')==='1';
  links.style.maxHeight=open?'0':'480px';
  links.setAttribute('data-open',open?'0':'1');
  if(arrow) arrow.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}
// Auto-expand if on a learn page
(function(){
  if(window.location.pathname.indexOf('learn.html')!==-1){
    var links=document.getElementById('study-links');
    var arrow=document.getElementById('study-arrow');
    if(links){links.style.maxHeight='480px';links.setAttribute('data-open','1');}
    if(arrow) arrow.style.transform='rotate(90deg)';
  }
})();
// Mobile hamburger
function toggleMobileNav(){
  var sb=document.getElementById('sidebar');
  var overlay=document.getElementById('mob-overlay');
  var open=sb.getAttribute('data-open')==='1';
  sb.style.transform=open?'translateX(-100%)':'translateX(0)';
  sb.setAttribute('data-open',open?'0':'1');
  if(overlay){overlay.style.opacity=open?'0':'1';overlay.style.pointerEvents=open?'none':'all';}
}

</script>
