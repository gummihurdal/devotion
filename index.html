<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eternal Word — Daily Devotional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:   #9A7828;
  --gold-l: #B8922A;
  --gold-d: #6A5020;
  --bg:     #FAFAF8;
  --panel:  #FFFFFF;
  --panel2: #F5F3EF;
  --border: #E2D8C8;
  --text:   #3A3530;
  --text-d: #7A6A55;
  --text-b: #1A1510;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}

.page{max-width:1100px;margin:0 auto;padding:0 32px 100px}

/* Nav */
nav{display:flex;align-items:center;justify-content:space-between;padding:32px 0 0;border-bottom:1px solid var(--border);padding-bottom:20px;animation:rise 0.6s ease both}
.nav-logo{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text-b);letter-spacing:2px;text-decoration:none}
.nav-links{display:flex;gap:32px}
.nav-links a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);text-decoration:none;transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* Header */
header{text-align:center;padding:56px 0 48px;animation:rise 0.8s ease both}
.hd-line{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px;opacity:0.35}
.hd-rule{height:1px;width:60px;background:var(--gold)}
.hd-sym{color:var(--gold);font-size:12px;letter-spacing:4px}
.h-greeting{font-family:'Cinzel',serif;font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
header h1{font-family:'Cinzel',serif;font-size:clamp(22px,3.5vw,34px);font-weight:600;color:var(--text-b);letter-spacing:2px;margin-bottom:6px}
.h-date{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d);margin-bottom:40px}

/* Opening quote in hero */
.hero-quote{max-width:680px;margin:0 auto 32px;border-left:2px solid var(--gold);padding:22px 32px;text-align:left;background:rgba(154,120,40,0.04)}
.hq-text{font-size:clamp(19px,2.5vw,24px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.75}
.hq-by{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-top:12px;font-weight:500}

.h-theme{font-family:'Cinzel',serif;font-size:13px;font-weight:500;color:var(--text-d);margin-bottom:36px;letter-spacing:1px}
.h-cta{display:inline-block;background:var(--text-b);color:#FFFFFF;font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;padding:14px 48px;text-decoration:none;transition:all 0.3s}
.h-cta:hover{background:var(--gold);transform:translateY(-1px);box-shadow:0 4px 20px rgba(154,120,40,0.2)}

/* Content area */
.content{padding:48px 0}

/* Info strip */
.info-strip{display:flex;gap:1px;margin-bottom:40px;background:var(--border)}
.info-cell{flex:1;background:var(--panel);padding:20px 24px}
.ic-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:7px}
.ic-val{font-size:15px;color:var(--text-d);line-height:1.5}

/* Two columns */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:28px}

/* Meditation block */
.med-block{background:var(--panel);border:1px solid var(--border);padding:40px;margin-bottom:20px}
.block-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-d);margin-bottom:18px}
.med-title{font-family:'Cinzel',serif;font-size:clamp(17px,2vw,21px);font-weight:600;color:var(--text-b);line-height:1.4;margin-bottom:22px}
.med-para p{font-size:clamp(17px,1.8vw,19px);line-height:2;color:var(--text);margin-bottom:18px}
.med-para p:last-child{margin-bottom:0}

.orn{display:flex;align-items:center;gap:12px;margin:24px 0;opacity:0.2}
.orn-line{flex:1;height:1px;background:var(--gold)}
.orn-dot{color:var(--gold);font-size:10px;letter-spacing:6px}

/* Call to action */
.call-block{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--text-b);padding:28px 32px;margin-bottom:20px;text-align:center}
.call-text{font-family:'Cinzel',serif;font-size:clamp(13px,1.5vw,15px);font-weight:500;color:var(--text-b);line-height:1.9}

/* Prayer */
.pray-block{background:var(--panel2);border:1px solid var(--border);padding:32px;margin-bottom:20px;text-align:center}
.pray-text{font-size:clamp(17px,1.8vw,20px);font-style:italic;font-weight:300;color:var(--text);line-height:2}

/* Closing scripture */
.scripture-close{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--gold);padding:40px 36px;text-align:center}
.sc-verse{font-size:clamp(20px,2.5vw,27px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.75;margin-bottom:16px}
.sc-ref{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold);font-weight:500;text-transform:uppercase}

/* Source tags */
.src-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.src-tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--border);color:var(--text-d)}

/* Sidebar panels */
.sp{background:var(--panel);border:1px solid var(--border);padding:24px;margin-bottom:16px}
.sp-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-d);margin-bottom:18px}
.sp-q{padding:16px 0;border-bottom:1px solid var(--border)}
.sp-q:first-child{padding-top:0}
.sp-q:last-child{border-bottom:none;padding-bottom:0}
.sp-qt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-bottom:8px}
.sp-qtxt{font-size:clamp(15px,1.5vw,17px);font-style:italic;font-weight:300;color:var(--text-b);line-height:1.65}
.sp-link{display:block;padding:10px 0;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-d);text-decoration:none;transition:color 0.2s}
.sp-link:last-child{border-bottom:none}
.sp-link:hover{color:var(--text-b)}

footer{text-align:center;padding:60px 0 20px;opacity:0.3}
footer p{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-d)}

#loading{text-align:center;padding:100px 0}
.load-t{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--text-d)}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:860px){.two-col{grid-template-columns:1fr}.info-strip{flex-direction:column}}
</style>
</head>
<body>
<div class="page">

  <nav>
    <a class="nav-logo" href="index.html">The Eternal Word</a>
    <div class="nav-links">
      <a href="index.html" class="active">Daily</a>
      <a href="topics.html">Topics</a>
      <a href="learn.html?topic=christian-identity">Identity</a>
      <a href="learn.html?topic=the-cross">The Cross</a>
      <a href="learn.html?topic=discipleship">Discipleship</a>
      <a href="learn.html?topic=apologetics">Apologetics</a>
      <a href="learn.html?topic=prayer">Prayer</a>
      <a href="learn.html?topic=suffering">Suffering</a>
      <a href="learn.html?topic=holy-spirit">Holy Spirit</a>
      <a href="learn.html?topic=sin-and-grace">Sin & Grace</a>
      <a href="learn.html?topic=the-church">The Church</a>
      <a href="learn.html?topic=eternity">Eternity</a>
      <a href="learn.html?topic=the-sabbath">The Sabbath</a>
      <a href="learn.html?topic=holiness-of-god">Holiness</a>
    </div>
  </nav>

  <div id="loading"><p class="load-t">Preparing today's word</p></div>
  <div id="content" style="display:none"></div>

  <footer><p>The fear of the LORD is the beginning of wisdom — Proverbs 9:10</p></footer>
</div>

<script>
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const GREET=['Midnight','Early Morning','Early Morning','Dawn','Dawn','Morning','Morning','Morning','Morning','Morning','Morning','Morning','Midday','Afternoon','Afternoon','Afternoon','Afternoon','Afternoon','Evening','Evening','Evening','Evening','Night','Night'];
const now=new Date();
const mm=String(now.getMonth()+1).padStart(2,'0'),dd=String(now.getDate()).padStart(2,'0');

async function init(){
  const r=await fetch(`${SB}/rest/v1/devotionals?month_day=eq.${mm}-${dd}&select=*&limit=1`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
  const rows=await r.json();
  if(!rows?.length) throw new Error();
  const d=rows[0];
  const paras=d.meditation.split(/\n\n|\n/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
  const srcs=(d.sources||[]).map(s=>`<span class="src-tag">${s}</span>`).join('');
  const qs=(d.reflection_questions||[]).map(q=>`<div class="sp-q"><div class="sp-qt">${q.topic}</div><div class="sp-qtxt">${q.question}</div></div>`).join('');
  document.getElementById('loading').style.display='none';
  const c=document.getElementById('content');
  c.style.display='block';
  c.innerHTML=`
    <header>
      <div class="hd-line"><div class="hd-rule"></div><span class="hd-sym">· · ·</span><div class="hd-rule"></div></div>
      <div class="h-greeting">Good ${GREET[now.getHours()]}</div>
      <h1>Daily Devotional</h1>
      <div class="h-date">${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}</div>
      <div class="hero-quote">
        <div class="hq-text">"${d.quote_text}"</div>
        <div class="hq-by">— ${d.quote_author}</div>
      </div>
      <div class="h-theme">${d.theme}</div>
      <a href="#content-body" class="h-cta">Begin Reading</a>
    </header>

    <div class="content" id="content-body">
      <div class="info-strip">
        <div class="info-cell"><div class="ic-lbl">Scripture</div><div class="ic-val">${d.scripture_reference}</div></div>
        <div class="info-cell"><div class="ic-lbl">Theme</div><div class="ic-val">${d.theme}</div></div>
        <div class="info-cell"><div class="ic-lbl">Sources</div><div class="ic-val">${(d.sources||[]).join(' · ')}</div></div>
      </div>
      <div class="two-col">
        <div>
          <div class="med-block">
            <div class="block-lbl">Meditation</div>
            <div class="med-title">${d.theme}</div>
            <div class="med-para">${paras}</div>
            <div class="src-row">${srcs}</div>
          </div>
          <div class="orn"><div class="orn-line"></div><span class="orn-dot">· · ·</span><div class="orn-line"></div></div>
          <div class="call-block">
            <div class="block-lbl">Today's Call</div>
            <div class="call-text">${d.call_to_action}</div>
          </div>
          <div class="pray-block">
            <div class="block-lbl">Closing Prayer</div>
            <div class="pray-text">${d.prayer}</div>
          </div>
          <div class="scripture-close">
            <div class="block-lbl">Today's Scripture</div>
            <div class="sc-verse">"${d.scripture_text}"</div>
            <div class="sc-ref">${d.scripture_reference}</div>
          </div>
        </div>
        <div>
          <div class="sp"><div class="sp-lbl">Reflection</div>${qs}</div>
          <div class="sp">
            <div class="sp-lbl">Study Deeper</div>
            <a class="sp-link" href="topics.html">All Twelve Topics</a>
            <a class="sp-link" href="learn.html?topic=the-cross">The Cross</a>
            <a class="sp-link" href="learn.html?topic=discipleship">Discipleship</a>
            <a class="sp-link" href="learn.html?topic=holiness-of-god">Holiness of God</a>
            <a class="sp-link" href="learn.html?topic=prayer">Prayer</a>
            <a class="sp-link" href="learn.html?topic=suffering">Suffering</a>
          </div>
        </div>
      </div>
    </div>`;
}
init().catch(()=>{document.getElementById('loading').innerHTML='<p class="load-t">Devotional coming soon</p>'});
</script>
</body>
</html>
